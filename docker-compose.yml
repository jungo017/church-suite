# 로컬 개발 인프라. Postgres 만으로 시작(스펙 §12: 초기 단순 구성).
# 기동:  docker compose up -d
# 종료:  docker compose down       (데이터 유지)
# 초기화: docker compose down -v    (볼륨 삭제)
services:
  postgres:
    image: postgres:16-alpine
    container_name: church-suite-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: church
      POSTGRES_PASSWORD: church
      POSTGRES_DB: church_suite
    ports:
      # 호스트 포트는 DB_PORT 로 변경 가능(기본 5432). 5432가 이미 쓰이면 .env 에서 DB_PORT 지정.
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U church -d church_suite"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3 호환 저장소(SeaweedFS). 기본 비활성 — 명시적 프로파일로만 기동.
  #   기동:  docker compose --profile storage up -d
  #   S3 엔드포인트: http://localhost:8333  (.env 의 STORAGE_* 로 연결)
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: church-suite-s3
    restart: unless-stopped
    profiles: ["storage"]
    command: server -s3 -dir=/data
    ports:
      - "8333:8333" # S3 API
      - "8888:8888" # filer
    volumes:
      - seaweeddata:/data

volumes:
  pgdata:
  seaweeddata:

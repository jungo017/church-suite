# church-suite 운영 스택 (스펙 §12). 빌드 컨텍스트는 레포 루트(..).
#   1) cp deploy/.env.prod.example deploy/.env.prod  (값 채우기)
#   2) docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod build
#   3) 최초 1회 마이그레이션:
#      docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod run --rm app npm run db:migrate
#   4) docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d
#
# 기본은 단일 인스턴스(스펙 §12 "초기 단순 구성"). 다중 인스턴스 확장은 README 참고.
name: church-suite-prod

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [app]
    ports:
      - "80:80"
      # - "443:443"   # TLS 사용 시(아래 certs 마운트)
    volumes:
      - ./nginx/church-suite.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/certs:/etc/nginx/certs:ro

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: church-suite:latest
    restart: unless-stopped
    env_file: [.env.prod]
    depends_on:
      postgres:
        condition: service_healthy
    expose: ["3000"]
    # 로컬 스토리지 드라이버(STORAGE_DRIVER=local)의 파일 영속화 + worker 와 공유.
    # s3 사용 시엔 불필요(SeaweedFS 가 보관).
    volumes:
      - appstorage:/data/storage
    command: ["npm", "run", "start"]

  worker:
    image: church-suite:latest # app 이 빌드한 이미지 재사용
    restart: unless-stopped
    env_file: [.env.prod]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - appstorage:/data/storage
    command: ["npm", "run", "worker"]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: church
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-church}
      POSTGRES_DB: church_suite
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U church -d church_suite"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── 확장용(기본 비활성) ─────────────────────────────────────────
  # 다중 인스턴스로 확장할 때: 앱 APP_DATABASE_URL 을 pgbouncer:6432 로 바꾸고
  #   docker compose ... --profile scale up -d
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    profiles: ["scale"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: church_suite
      DB_USER: church_app
      DB_PASSWORD: ${APP_DB_PASSWORD:-church_app}
      POOL_MODE: transaction # withTenant=SET LOCAL, postgres.js prepare:false 와 호환
      MAX_CLIENT_CONN: "500"
      DEFAULT_POOL_SIZE: "20"
    depends_on:
      postgres:
        condition: service_healthy
    expose: ["6432"]

  # 공용 오브젝트 스토리지(S3 호환). 다중 인스턴스면 로컬 디스크 대신 필수.
  #   STORAGE_DRIVER=s3, STORAGE_ENDPOINT=http://seaweedfs:8333
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    profiles: ["storage"]
    command: server -s3 -dir=/data
    expose: ["8333"]
    volumes:
      - seaweeddata:/data

volumes:
  pgdata:
  appstorage: # 로컬 스토리지 드라이버 파일(STORAGE_LOCAL_DIR=/data/storage)
  seaweeddata:

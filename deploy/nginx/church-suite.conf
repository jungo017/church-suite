# church-suite 리버스프록시 (스펙 §12). TLS 종료·정적 캐시·서브도메인 라우팅.
upstream church_app {
    server app:3000;
    # 인스턴스 추가 시(수평 확장): server app2:3000; server app3:3000; ...
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    # 운영: server_name example.com *.example.com;  (와일드카드 서브도메인 = 교회 코드)
    server_name _;

    # 파일 첨부 업로드 여유
    client_max_body_size 25m;

    # Next 정적 자산 — 불변, 장기 캐시
    location /_next/static/ {
        proxy_pass http://church_app;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://church_app;
        proxy_http_version 1.1;
        # 테넌트(서브도메인) 해석에 원본 Host 가 필수 — proxy.ts 가 호스트를 파싱한다.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 300s;
    }
}

